<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64FFDA"/>
      <stop offset="100%" stop-color="#00BFFF"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="48" height="48" rx="11" fill="#0A192F"/>

  <!-- 300° gauge ring — gap at bottom (60° gap centred at 90°=bottom) -->
  <!-- Start lower-left: (24+18·cos120°, 24+18·sin120°) = (15, 39.6) -->
  <!-- End  lower-right: (24+18·cos60°,  24+18·sin60°)  = (33, 39.6) -->
  <!-- sweep=0 (counterclockwise → goes over the top), large-arc=1    -->
  <path d="M 15 39.6 A 18 18 0 1 0 33 39.6"
        fill="none" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>

  <!-- Sparkline: weight loss trend (past=upper-left → present=lower-right) -->
  <polyline points="13,17 24,23 35,29"
            fill="none" stroke="url(#g)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Historical dots (smaller, dimmer) -->
  <circle cx="13" cy="17" r="2"   fill="#64FFDA" opacity="0.4"/>
  <circle cx="24" cy="23" r="2"   fill="#64FFDA" opacity="0.65"/>

  <!-- Current / latest dot -->
  <circle cx="35" cy="29" r="3.5" fill="url(#g)"/>
</svg>
